<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>tall grass</title>
<style>
  /* Full-mode CSS, copied from app/src/styles/globals.css (.stage-full,
     body.full-mode). On-chain page has no body chrome, so we apply
     these defaults to the page root and document body directly. */
  *, *::before, *::after { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #000;
    cursor: none;
    width: 100%;
    height: 100%;
    color: #e8e8e8;
    font-family: Helvetica, "Helvetica Neue", Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  /* The canvas itself — fixed-position fullbleed, matches .stage-full +
     the .stage canvas rule (display:block; inset:0). */
  canvas#tg {
    display: block;
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    z-index: 0;
  }
  /* Atmospheric overlay — the page-presentation vignette and edge
     gradients copied verbatim from globals.css `.stage::after` so the
     on-chain viewer reads identically to the web app's stage. The
     full-mode rule in globals.css suppresses the body-level chrome the
     React app would otherwise carry; here there is no body chrome, so
     we keep the gradient as an explicit overlay. Sits above the canvas
     (z:1) and below any future debug UI. pointer-events:none so the
     surface stays interactive (cursor is hidden anyway). */
  .overlay {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background:
      linear-gradient(to bottom, rgba(0,0,0,0.40) 0%, rgba(0,0,0,0) 90px),
      linear-gradient(to top,    rgba(0,0,0,0.58) 0%, rgba(0,0,0,0.30) 22%, rgba(0,0,0,0) 38%),
      radial-gradient(120% 80% at 50% 38%, transparent 0%, rgba(0,0,0,0.22) 78%, rgba(0,0,0,0.40) 100%);
    z-index: 1;
  }
</style>
</head>
<body>
<canvas id="tg"></canvas>
<div class="overlay"></div>
<!--TG_ID_INJECT--><!--TG_ID_INJECT--></body>
</html>
